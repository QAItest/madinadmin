  <text x="68" y="180" fill="#93c5fd" font-size="20" font-weight="700"># Diagnostic d'éligibilité — Asso Culture MTQ</text>
  <text x="68" y="208" fill="#64748b" font-size="13">## Résumé exécutif</text>
  <text x="68" y="232" fill="#cbd5e1" font-size="13">L'association loi 1901 « Culture Martinique » est éligible au FEDER axe 5.1 « Une Martinique plus</text>
  <text x="68" y="250" fill="#cbd5e1" font-size="13">connectée » pour son projet de transition numérique. Cofinancement maximal : 80%. Montant éligible</text>
  <text x="68" y="268" fill="#cbd5e1" font-size="13">estimé : 145 000 €.</text>

  <text x="68" y="298" fill="#64748b" font-size="13">## Critères d'éligibilité</text>

  <text x="68" y="322" fill="#22c55e" font-size="13">✓  Structure : Association loi 1901 — éligible dispositif FSE+ et FEDER volets associatifs</text>
  <text x="68" y="342" fill="#22c55e" font-size="13">✓  Territoire : Martinique — Région ultrapériphérique, taux majoration 20 pts applicable</text>
  <text x="68" y="362" fill="#22c55e" font-size="13">✓  Secteur : Culture &amp; numérique — convergence axes 5.1/5.2 PO Martinique 2021-2027</text>
  <text x="68" y="382" fill="#22c55e" font-size="13">✓  Budget : 180 000 € total — seuil minimal 50 000 € atteint, plafond 500 000 € non dépassé</text>
  <text x="68" y="402" fill="#f59e0b" font-size="13">⚠  Calendrier : démarrage prévu J+45 — vérifier date de clôture de l'appel (31 juillet 2026)</text>

  <text x="68" y="432" fill="#64748b" font-size="13">## Dispositifs recommandés par ordre de priorité</text>
  <text x="68" y="456" fill="#cbd5e1" font-size="13">1.  FEDER axe 5.1 — Très Haut Débit &amp; usages numériques (cofinancement 80%, priorité haute)</text>
  <text x="68" y="476" fill="#cbd5e1" font-size="13">2.  FSE+ inclusion numérique — si public cible élargi aux bénéficiaires en insertion (60%)</text>
  <text x="68" y="496" fill="#cbd5e1" font-size="13">3.  Appel CTM Culture &amp; Innovation — cumulable sous conditions, vérifier règle de non-cumul</text>

