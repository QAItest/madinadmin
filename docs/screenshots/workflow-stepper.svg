<svg width="1200" height="500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="1200" height="500" fill="#0f172a"/>
  <rect width="1200" height="56" fill="#1e293b"/>
  <text x="24" y="33" fill="#f1f5f9" font-size="16" font-weight="700">Madin'Admin</text>
  <text x="200" y="33" fill="#94a3b8" font-size="13">Dossier — Asso Culture MTQ · FEDER axe 5.1</text>

  <!-- Workflow stepper -->
  <text x="60" y="100" fill="#f1f5f9" font-size="18" font-weight="700">Workflow FEDER — État d'avancement</text>

  <!-- Steps -->
  <!-- Step 1: Diagnostic - done -->
  <circle cx="120" cy="200" r="28" fill="#22c55e"/>
  <text x="120" y="207" fill="white" font-size="18" text-anchor="middle">✓</text>
  <text x="120" y="252" fill="#22c55e" font-size="12" text-anchor="middle" font-weight="600">Diagnostic</text>
  <text x="120" y="268" fill="#64748b" font-size="11" text-anchor="middle">J-60</text>

  <!-- connector -->
  <line x1="148" y1="200" x2="230" y2="200" stroke="#22c55e" stroke-width="3"/>

  <!-- Step 2: Montage - done -->
  <circle cx="258" cy="200" r="28" fill="#22c55e"/>
  <text x="258" y="207" fill="white" font-size="18" text-anchor="middle">✓</text>
  <text x="258" y="252" fill="#22c55e" font-size="12" text-anchor="middle" font-weight="600">Montage</text>
  <text x="258" y="268" fill="#64748b" font-size="11" text-anchor="middle">J-45</text>

  <!-- connector -->
  <line x1="286" y1="200" x2="368" y2="200" stroke="#22c55e" stroke-width="3"/>

  <!-- Step 3: Checklist - done -->
  <circle cx="396" cy="200" r="28" fill="#22c55e"/>
  <text x="396" y="207" fill="white" font-size="18" text-anchor="middle">✓</text>
  <text x="396" y="252" fill="#22c55e" font-size="12" text-anchor="middle" font-weight="600">Checklist</text>
  <text x="396" y="268" fill="#64748b" font-size="11" text-anchor="middle">J-30</text>

  <!-- connector -->
  <line x1="424" y1="200" x2="506" y2="200" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- Step 4: Contrôle - active -->
  <circle cx="534" cy="200" r="28" fill="#f59e0b"/>
  <circle cx="534" cy="200" r="22" fill="#0f172a"/>
  <circle cx="534" cy="200" r="14" fill="#f59e0b"/>
  <text x="534" y="207" fill="white" font-size="14" text-anchor="middle" font-weight="700">4</text>
  <text x="534" y="252" fill="#f59e0b" font-size="12" text-anchor="middle" font-weight="700">Contrôle</text>
  <text x="534" y="268" fill="#64748b" font-size="11" text-anchor="middle">J-10 · EN COURS</text>

  <!-- connector -->
  <line x1="562" y1="200" x2="644" y2="200" stroke="#334155" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- Step 5: Dépôt - pending -->
  <circle cx="672" cy="200" r="28" fill="#334155"/>
  <text x="672" y="207" fill="#64748b" font-size="14" text-anchor="middle" font-weight="700">5</text>
  <text x="672" y="252" fill="#64748b" font-size="12" text-anchor="middle">Dépôt</text>
  <text x="672" y="268" fill="#475569" font-size="11" text-anchor="middle">J+0</text>

  <!-- connector -->
  <line x1="700" y1="200" x2="782" y2="200" stroke="#334155" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- Step 6: Suivi - pending -->
  <circle cx="810" cy="200" r="28" fill="#334155"/>
  <text x="810" y="207" fill="#64748b" font-size="14" text-anchor="middle" font-weight="700">6</text>
  <text x="810" y="252" fill="#64748b" font-size="12" text-anchor="middle">Suivi</text>
  <text x="810" y="268" fill="#475569" font-size="11" text-anchor="middle">J+0 → J+90</text>

  <!-- connector -->
  <line x1="838" y1="200" x2="920" y2="200" stroke="#334155" stroke-width="3" stroke-dasharray="6,3"/>

  <!-- Step 7: Archivage - pending -->
  <circle cx="948" cy="200" r="28" fill="#334155"/>
  <text x="948" y="207" fill="#64748b" font-size="14" text-anchor="middle" font-weight="700">7</text>
  <text x="948" y="252" fill="#64748b" font-size="12" text-anchor="middle">Archivage</text>
  <text x="948" y="268" fill="#475569" font-size="11" text-anchor="middle">J+90</text>

  <!-- Rapport de conformité panel -->
  <rect x="60" y="310" width="520" height="150" rx="8" fill="#1e293b"/>
  <text x="80" y="338" fill="#f1f5f9" font-size="14" font-weight="600">Rapport de conformité — Contrôleur</text>
  <rect x="76" y="350" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="92" y="360" fill="#f1f5f9" font-size="12">Cohérence budget / calendrier</text>
  <rect x="76" y="370" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="92" y="380" fill="#f1f5f9" font-size="12">Indicateurs SMART raccordés au PO</text>
  <rect x="76" y="390" width="8" height="8" rx="2" fill="#f59e0b"/>
  <text x="92" y="400" fill="#fbbf24" font-size="12">⚠ Attestation URSSAF expire avant dépôt — renouvellement requis</text>
  <rect x="76" y="410" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="92" y="420" fill="#f1f5f9" font-size="12">Obligations publicité européenne (logo FEDER, drapeau)</text>
  <rect x="76" y="430" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="92" y="440" fill="#f1f5f9" font-size="12">Taux cofinancement 80% — conforme</text>

  <!-- Actions panel -->
  <rect x="620" y="310" width="520" height="150" rx="8" fill="#1e293b"/>
  <text x="640" y="338" fill="#f1f5f9" font-size="14" font-weight="600">Actions disponibles</text>
  <rect x="640" y="350" width="180" height="36" rx="6" fill="#003189"/>
  <text x="730" y="373" fill="white" font-size="13" text-anchor="middle">▶  Lancer /controle</text>
  <rect x="836" y="350" width="180" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="926" y="373" fill="#94a3b8" font-size="13" text-anchor="middle">↓  Exporter PDF</text>
  <text x="640" y="420" fill="#64748b" font-size="12">Agent actif : Contrôleur (claude-opus-4-7)</text>
  <text x="640" y="440" fill="#64748b" font-size="12">Statut : 1 alerte orange · 0 bloquant rouge</text>

  <text x="600" y="486" fill="#475569" font-size="12" text-anchor="middle">Madin'Admin · Vue dossier avec workflow stepper · localhost:3000/dossiers/[id]</text>
</svg>
