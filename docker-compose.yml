services:
  postgres:
    image: postgres:16-alpine
    container_name: madin_postgres
    environment:
      POSTGRES_USER: madin
      POSTGRES_PASSWORD: madinpass
      POSTGRES_DB: madin_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U madin -d madin_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: madin_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@madin.local
      PGADMIN_DEFAULT_PASSWORD: adminpass
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
